<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Matematyczne Jajka</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; }
        body { display: flex; align-items: center; justify-content: center; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>
    <a href="../" style="position:fixed;top:10px;left:10px;z-index:100;background:rgba(0,0,0,0.55);color:#fff;padding:8px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-family:'Segoe UI',sans-serif;backdrop-filter:blur(4px);">← Menu</a>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let punkty = 0, poprawne = 0, bledne = 0, ruchy = 20;
        let koszykX = 400, jajkaY = -50, predkosc = 3;
        let menuEtap = "wiek";
        let wybranyWiek = 10, wybranyTryb = "losowo";
        let zadanie = "", poprawnyWynik = 0, opcje = [];
        let gwiazdki = [], lastFeedback = null, feedbackTimer = 0;
        let chmury = [{x:100,y:60,r:0.3},{x:420,y:40,r:0.5},{x:650,y:80,r:0.4}];
        let bgStars = Array.from({length:40}, () => ({x:Math.random()*800, y:Math.random()*600, r:Math.random()*2+0.5, a:Math.random()}));

        const przyciskiWiek = [
            { id: 6, txt: "Poziom: 6 lat", y: 190, color: "#27ae60", hov: "#2ecc71" },
            { id: 10, txt: "Poziom: 10 lat", y: 268, color: "#2980b9", hov: "#3498db" },
            { id: 14, txt: "Poziom: 14 lat", y: 346, color: "#d4ac0d", hov: "#f1c40f" },
            { id: 99, txt: "Poziom: Dorosły", y: 424, color: "#c0392b", hov: "#e74c3c" }
        ];
        let przyciskiOperacja = [];

        function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function generujZadanie() {
            let tryb = wybranyTryb;
            if (tryb === "losowo") {
                let mozliwosci = ["dodawanie", "odejmowanie"];
                if (wybranyWiek >= 10) mozliwosci.push("mnożenie", "dzielenie");
                tryb = mozliwosci[Math.floor(Math.random() * mozliwosci.length)];
            }
            let a, b, wynik, symbol;
            const w = wybranyWiek;

            if (tryb === "dodawanie") {
                symbol = "+";
                if (w == 6) { a = r(1, 12); b = r(1, 20-a); }
                else if (w == 10) { a = r(10, 70); b = r(10, 99-a); }
                else if (w == 14) { a = r(50, 400); b = r(50, 500-a); }
                else { a = r(100, 800); b = r(100, 1000-a); }
                wynik = a + b;
            } else if (tryb === "odejmowanie") {
                symbol = "-";
                if (w == 6) { a = r(10, 20); b = r(1, a-2); }
                else if (w == 10) { a = r(30, 100); b = r(10, a-5); }
                else if (w == 14) { a = r(100, 500); b = r(50, a-20); }
                else { a = r(400, 1000); b = r(100, a-50); }
                wynik = a - b;
            } else if (tryb === "mnożenie") {
                symbol = "×";
                if (w == 10) { a = r(2, 10); b = r(2, 10); }
                else if (w == 14) { a = r(5, 18); b = r(3, 15); }
                else { a = r(10, 32); b = r(5, 28); }
                wynik = a * b;
            } else if (tryb === "dzielenie") {
                symbol = "÷";
                if (w == 10) { wynik = r(2, 10); b = r(2, 10); }
                else if (w == 14) { wynik = r(5, 15); b = r(3, 12); }
                else { wynik = r(10, 35); b = r(5, 20); }
                a = wynik * b;
            }

            zadanie = `${a} ${symbol} ${b} = ?`;
            poprawnyWynik = wynik;
            opcje = [wynik];
            let off = (w == 6) ? 3 : (w == 10 ? 7 : 12);
            while (opcje.length < 3) {
                let f = wynik + (r(1, off*2) - off);
                if (!opcje.includes(f) && f >= 0) opcje.push(f);
            }
            opcje.sort(() => Math.random() - 0.5);
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const src = e.touches ? e.touches[0] : e;
            return {
                x: (src.clientX - rect.left) * (800 / rect.width),
                y: (src.clientY - rect.top)  * (600 / rect.height)
            };
        }

        function handleDown(e) {
            const {x: mX, y: mY} = getCoords(e);
            if (menuEtap === "wiek") {
                przyciskiWiek.forEach(btn => {
                    if (mX > 200 && mX < 600 && mY > btn.y && mY < btn.y + 58) {
                        wybranyWiek = btn.id;
                        ustawPrzyciskiOperacji();
                        menuEtap = "operacja";
                    }
                });
            } else if (menuEtap === "operacja") {
                if (mX > 20 && mX < 140 && mY > 20 && mY < 60) menuEtap = "wiek";
                przyciskiOperacja.forEach(btn => {
                    if (mX > 230 && mX < 570 && mY > btn.y && mY < btn.y + 52) {
                        wybranyTryb = btn.id;
                        resetGry();
                        menuEtap = "gra";
                    }
                });
            } else if (menuEtap === "gra") {
                if (mX > 660 && mX < 790 && mY > 14 && mY < 58) menuEtap = "wiek";
            } else if (menuEtap === "koniec") {
                menuEtap = "wiek";
            }
        }

        function handleMove(e) {
            if (menuEtap !== "gra") return;
            e.preventDefault();
            koszykX = getCoords(e).x;
        }

        canvas.addEventListener("mousedown", handleDown);
        canvas.addEventListener("touchstart", handleDown, {passive: true});
        canvas.addEventListener("mousemove", handleMove);
        canvas.addEventListener("touchmove", handleMove, {passive: false});

        function ustawPrzyciskiOperacji() {
            let y = 170;
            przyciskiOperacja = [
                { id: "dodawanie",  txt: "Dodawanie (+)",  y: y },
                { id: "odejmowanie", txt: "Odejmowanie (−)", y: y += 68 }
            ];
            if (wybranyWiek >= 10) {
                przyciskiOperacja.push({ id: "mnożenie",  txt: "Mnożenie (×)",  y: y += 68 });
                przyciskiOperacja.push({ id: "dzielenie", txt: "Dzielenie (÷)", y: y += 68 });
            }
            przyciskiOperacja.push({ id: "losowo", txt: "🎲 Losowo", y: y += 68 });
        }

        function resetGry() {
            punkty = 0; poprawne = 0; bledne = 0; ruchy = 20;
            predkosc = 3; jajkaY = -50; gwiazdki = []; generujZadanie();
        }

        function spawnGwiazdki(x, y, ok) {
            for (let i = 0; i < 14; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                gwiazdki.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    life: 1,
                    color: ok ? `hsl(${r(90,150)},90%,55%)` : `hsl(${r(0,20)},90%,55%)`
                });
            }
        }

        function updateGwiazdki() {
            gwiazdki = gwiazdki.filter(g => g.life > 0);
            gwiazdki.forEach(g => { g.x += g.vx; g.y += g.vy; g.vy += 0.2; g.life -= 0.035; });
        }

        function update() {
            if (menuEtap !== "gra") return;
            jajkaY += predkosc;
            if (feedbackTimer > 0) feedbackTimer--;
            if (jajkaY > 510 && jajkaY < 580) {
                for (let i = 0; i < 3; i++) {
                    if (Math.abs(koszykX - (i + 1) * 200) < 75) {
                        const ok = opcje[i] === poprawnyWynik;
                        if (ok) { punkty++; poprawne++; predkosc += 0.15; }
                        else { punkty--; bledne++; }
                        spawnGwiazdki((i+1)*200, 530, ok);
                        lastFeedback = ok ? "✓" : "✗";
                        feedbackTimer = 45;
                        ruchy--;
                        jajkaY = -50; generujZadanie(); break;
                    }
                }
            }
            if (jajkaY > 600) {
                bledne++; punkty--; ruchy--;
                lastFeedback = "✗"; feedbackTimer = 45;
                jajkaY = -50; generujZadanie();
            }
            updateGwiazdki();
            if (ruchy <= 0 || punkty >= 20 || punkty <= -5) menuEtap = "koniec";
        }

        /* ---- drawing helpers ---- */
        function skyGradient() {
            const g = ctx.createLinearGradient(0, 0, 0, 600);
            g.addColorStop(0, "#0d1b3e");
            g.addColorStop(1, "#1a4a6e");
            return g;
        }

        function drawBgStars() {
            bgStars.forEach(s => {
                s.a += 0.01;
                const alpha = 0.4 + 0.4 * Math.abs(Math.sin(s.a));
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            });
        }

        function drawCloud(cx, cy, scale) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.fillStyle = "rgba(255,255,255,0.12)";
            [[0,0,40],[30,-10,30],[-30,-8,32],[55,5,28],[-55,5,25]].forEach(([x,y,rad]) => {
                ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI*2); ctx.fill();
            });
            ctx.restore();
        }

        function drawGround() {
            const g = ctx.createLinearGradient(0, 575, 0, 600);
            g.addColorStop(0, "#27ae60");
            g.addColorStop(1, "#1e8449");
            ctx.fillStyle = g;
            ctx.fillRect(0, 575, 800, 25);
        }

        function drawButton(txt, x, y, w, h, color, fontSize = 21) {
            const shadow = ctx.shadowBlur;
            ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 4;
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 12); ctx.fill();
            ctx.shadowBlur = shadow; ctx.shadowOffsetY = 0;
            // shine
            const shine = ctx.createLinearGradient(x, y, x, y + h/2);
            shine.addColorStop(0, "rgba(255,255,255,0.18)");
            shine.addColorStop(1, "rgba(255,255,255,0)");
            ctx.fillStyle = shine;
            ctx.beginPath(); ctx.roundRect(x, y, w, h/2, [12, 12, 0, 0]); ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = `bold ${fontSize}px 'Segoe UI', Arial`;
            ctx.fillText(txt, x + w/2 - ctx.measureText(txt).width/2, y + h/2 + fontSize*0.35);
        }

        function drawEgg(x, y, val, highlight) {
            // shadow
            ctx.save();
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 18;
            ctx.shadowOffsetY = 8;
            const eg = ctx.createRadialGradient(x - 10, y - 15, 5, x, y, 48);
            eg.addColorStop(0, highlight ? "#ffe066" : "#5dade2");
            eg.addColorStop(1, highlight ? "#f39c12" : "#1a5276");
            ctx.fillStyle = eg;
            ctx.beginPath(); ctx.ellipse(x, y, 38, 50, 0, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
            // shine
            ctx.fillStyle = "rgba(255,255,255,0.35)";
            ctx.beginPath(); ctx.ellipse(x - 10, y - 16, 12, 18, -0.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            ctx.fillStyle = "white";
            ctx.font = `bold 26px 'Segoe UI', Arial`;
            ctx.textAlign = "center";
            ctx.fillText(val, x, y + 9);
            ctx.textAlign = "left";
        }

        function drawBasket(bx) {
            ctx.save();
            ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 4;
            const bg = ctx.createLinearGradient(bx-75, 548, bx+75, 548);
            bg.addColorStop(0, "#6c3483");
            bg.addColorStop(0.5, "#9b59b6");
            bg.addColorStop(1, "#6c3483");
            ctx.fillStyle = bg;
            ctx.beginPath(); ctx.roundRect(bx - 75, 548, 150, 30, [0, 0, 12, 12]); ctx.fill();
            // rim
            ctx.strokeStyle = "#d7bde2"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(bx - 75, 552); ctx.lineTo(bx + 75, 552); ctx.stroke();
            ctx.restore();
        }

        function drawGwiazdki() {
            gwiazdki.forEach(g => {
                ctx.save();
                ctx.globalAlpha = g.life;
                ctx.fillStyle = g.color;
                ctx.beginPath();
                ctx.arc(g.x, g.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function drawHUD() {
            // bar background
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.beginPath(); ctx.roundRect(10, 10, 630, 42, 10); ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 17px 'Segoe UI', Arial";
            ctx.fillText(`⭐ ${punkty}  ✅ ${poprawne}  ❌ ${bledne}  🎯 ${ruchy}`, 22, 37);
            // feedback flash
            if (feedbackTimer > 0) {
                ctx.save();
                ctx.globalAlpha = feedbackTimer / 45;
                ctx.font = `bold 72px Arial`;
                ctx.fillStyle = lastFeedback === "✓" ? "#2ecc71" : "#e74c3c";
                ctx.textAlign = "center";
                ctx.fillText(lastFeedback, 400, 320);
                ctx.textAlign = "left";
                ctx.restore();
            }
        }

        function draw() {
            // background
            ctx.fillStyle = skyGradient();
            ctx.fillRect(0, 0, 800, 600);
            drawBgStars();

            if (menuEtap === "wiek") {
                chmury.forEach(c => { c.x = (c.x + 0.4) % 900; drawCloud(c.x, c.y * 3, c.r * 1.5 + 0.7); });
                // panel
                ctx.fillStyle = "rgba(255,255,255,0.07)";
                ctx.beginPath(); ctx.roundRect(150, 130, 500, 370, 20); ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 34px 'Segoe UI', Arial";
                ctx.textAlign = "center";
                ctx.fillText("🥚 Matematyczne Jajka 🥚", 400, 175);
                ctx.font = "22px 'Segoe UI', Arial";
                ctx.fillStyle = "#aad4f5";
                ctx.fillText("Wybierz poziom", 400, 210);
                ctx.textAlign = "left";
                przyciskiWiek.forEach(btn => drawButton(btn.txt, 200, btn.y, 400, 58, btn.color));
            } else if (menuEtap === "operacja") {
                chmury.forEach(c => { c.x = (c.x + 0.4) % 900; drawCloud(c.x, c.y * 3, c.r * 1.5 + 0.7); });
                ctx.fillStyle = "rgba(255,255,255,0.07)";
                ctx.beginPath(); ctx.roundRect(150, 120, 500, 390, 20); ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 28px 'Segoe UI', Arial";
                ctx.textAlign = "center";
                ctx.fillText("Wybierz działanie", 400, 165);
                ctx.textAlign = "left";
                drawButton("← Powrót", 20, 16, 130, 42, "#7f8c8d", 17);
                przyciskiOperacja.forEach(btn => drawButton(btn.txt, 230, btn.y, 340, 52, "#2c3e50"));
            } else if (menuEtap === "gra") {
                chmury.forEach(c => { c.x = (c.x + 0.3) % 900; drawCloud(c.x, c.y * 2.5, c.r + 0.5); });
                drawGround();
                drawHUD();
                drawButton("Menu", 662, 14, 128, 42, "#e67e22", 17);
                // zadanie panel
                ctx.fillStyle = "rgba(255,255,255,0.12)";
                ctx.beginPath(); ctx.roundRect(180, 65, 440, 70, 15); ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 50px 'Segoe UI', Arial";
                ctx.textAlign = "center";
                ctx.fillText(zadanie, 400, 120);
                ctx.textAlign = "left";
                // eggs
                opcje.forEach((val, i) => drawEgg((i+1)*200, jajkaY, val, false));
                drawBasket(koszykX);
                drawGwiazdki();
            } else if (menuEtap === "koniec") {
                const win = punkty >= 20;
                const drawLose = punkty <= -5;
                let msg, endColor;
                if (drawLose) { msg = "KONIEC GRY 💔"; endColor = "#e74c3c"; }
                else if (win) { msg = "ZWYCIĘSTWO! 🏆"; endColor = "#2ecc71"; }
                else { msg = "SESJA ZAKOŃCZONA!"; endColor = "#f1c40f"; }
                ctx.fillStyle = "rgba(255,255,255,0.08)";
                ctx.beginPath(); ctx.roundRect(150, 120, 500, 360, 20); ctx.fill();
                ctx.textAlign = "center";
                ctx.font = "bold 52px 'Segoe UI', Arial";
                ctx.fillStyle = endColor;
                ctx.fillText(msg, 400, 210);
                ctx.font = "26px 'Segoe UI', Arial";
                ctx.fillStyle = "white";
                ctx.fillText(`Wynik końcowy: ${punkty}`, 400, 275);
                ctx.fillText(`✅ Poprawne: ${poprawne}`, 400, 315);
                ctx.fillText(`❌ Błędne: ${bledne}`, 400, 355);
                ctx.font = "bold 20px 'Segoe UI', Arial";
                ctx.fillStyle = "#aad4f5";
                ctx.fillText("Dotknij, aby wrócić do menu", 400, 430);
                ctx.textAlign = "left";
            }
            requestAnimationFrame(draw);
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
            }
        }
        setInterval(update, 1000/60); draw();
    </script>
</body>
</html>
