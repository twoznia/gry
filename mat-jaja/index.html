<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Matematyczne Jajka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../" style="position:fixed;top:10px;left:10px;z-index:100;background:rgba(0,0,0,0.55);color:#fff;padding:8px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-family:'Segoe UI',sans-serif;backdrop-filter:blur(4px);">← Menu</a>
    <div id="lang-switcher" style="position:fixed;top:10px;right:10px;z-index:100;display:flex;gap:4px;">
        <button id="btn-pl" onclick="setLang('pl')" style="background:rgba(0,0,0,0.55);border:1px solid #888;border-radius:20px;padding:4px 10px;line-height:0;cursor:pointer;"><img src="https://flagcdn.com/24x18/pl.png" width="24" height="18" alt="Polski" style="display:block;border-radius:3px;"></button>
        <button id="btn-en" onclick="setLang('en')" style="background:rgba(0,0,0,0.55);border:1px solid #888;border-radius:20px;padding:4px 10px;line-height:0;cursor:pointer;"><img src="https://flagcdn.com/24x18/gb.png" width="24" height="18" alt="English" style="display:block;border-radius:3px;"></button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
