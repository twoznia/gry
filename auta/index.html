<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elektronika IM-23</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<a href="../" style="position:fixed;top:10px;left:10px;z-index:100;background:#555;color:#fff;padding:8px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-family:'Courier New',Courier,monospace;border:1px solid #888;">← Menu</a>
<div id="lang-switcher" style="position:fixed;top:10px;right:10px;z-index:100;display:flex;gap:4px;">
    <button id="btn-pl" onclick="setLang('pl')" style="background:transparent;border:1px solid #888;border-radius:20px;padding:4px 10px;line-height:0;cursor:pointer;"><img src="https://flagcdn.com/24x18/pl.png" width="24" height="18" alt="Polski" style="display:block;border-radius:3px;"></button>
    <button id="btn-en" onclick="setLang('en')" style="background:transparent;border:1px solid #888;border-radius:20px;padding:4px 10px;line-height:0;cursor:pointer;"><img src="https://flagcdn.com/24x18/gb.png" width="24" height="18" alt="English" style="display:block;border-radius:3px;"></button>
</div>

<div id="console">
    <div id="screen-border">
        <div id="screen">
            <div id="ui">
                <div id="hi-score">HI: 0000</div>
                <div id="score">0000</div>
                <div id="lives">♥♥♥</div>
            </div>
            
            <div id="overlay">
                <h1 id="status-title" style="margin:0; font-size: 32px;">AUTOSLALOM</h1>
                <p id="final-info" style="font-size: 14px; margin: 15px 0;">TRYB SPOKOJNY<br>Have Fun!!!</p>
                <button class="menu-btn" id="action-btn" onclick="startGame()">START</button>
            </div>

            <div id="player" class="car-shape" style="bottom: 30px; display: none;">
                <div class="wheel w1"></div><div class="wheel w2"></div>
                <div class="car-body"></div>
                <div class="wheel w3"></div><div class="wheel w4"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="handleMove('L')">LEWO</button>
        <button class="btn" onclick="handleMove('P')">PRAWO</button>
        <button class="btn-reset" onclick="resetHiScore()" id="btn-reset-hi">RESETUJ REKORD</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
