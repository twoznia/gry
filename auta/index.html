<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elektronika IM-23</title>
    <style>
        :root { 
            --bg-lcd: #8b956d; 
            --segment-on: rgba(0, 0, 0, 0.85); 
            --case: #d1d1d1; 
            --hit-color: #a00; 
        }
        body { 
            background: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; /* Blokuje przybliżanie i przesuwanie strony */
        }
        
        #console { 
            background: var(--case); 
            width: 90vw; 
            max-width: 400px; 
            height: 90vh; 
            max-height: 800px;
            display: flex;
            flex-direction: column;
            padding: 20px; 
            border-radius: 40px; 
            box-shadow: inset -5px -5px 15px #888, 0 20px 50px #000; 
            border: 4px solid #bbb; 
        }

        #screen-border { 
            background: #333; 
            padding: 10px; 
            border-radius: 15px; 
            flex-grow: 1;
            display: flex;
        }

        #screen { 
            width: 100%; 
            background: var(--bg-lcd); 
            position: relative; 
            overflow: hidden; 
            border: 3px solid #555;
            border-radius: 5px;
        }
        
        .car-shape { 
            position: absolute; 
            width: 54px; 
            height: 35px; 
            transition: left 0.08s ease-out; 
        }
        .car-body { 
            position: absolute; 
            width: 32px; 
            height: 35px; 
            background: var(--segment-on); 
            left: 11px; 
            border-radius: 4px; 
        }
        .car-body::before { 
            content: ''; 
            position: absolute; 
            width: 24px; 
            height: 10px; 
            background: var(--bg-lcd); 
            left: 4px; 
            top: 6px; 
            border-radius: 2px; 
        }
        .wheel { 
            position: absolute; 
            width: 8px; 
            height: 10px; 
            background: var(--segment-on); 
            border-radius: 2px; 
        }
        .w1 { top: 4px; left: 0; } .w2 { top: 4px; right: 0; }
        .w3 { bottom: 4px; left: 0; } .w4 { bottom: 4px; right: 0; }

        #ui { 
            position: absolute; 
            top: 10px; 
            right: 15px; 
            text-align: right; 
            color: var(--segment-on); 
            z-index: 5; 
        }
        #score { font-size: 32px; font-weight: bold; }
        #hi-score { font-size: 14px; opacity: 0.8; }

        .controls { 
            margin-top: 10px;
            padding-bottom: 10px;
        }
        .btn { 
            display: none;
        }
        .btn-reset { 
            width: 100%;
            padding: 8px; 
            background: #555; 
            border: 1px solid #000; 
            font-size: 11px; 
            color: #fff; 
            border-radius: 8px;
            margin-top: 5px;
        }
        
        #overlay { 
            position: absolute; 
            inset: 0; 
            background: var(--bg-lcd); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 10; 
            text-align: center; 
            padding: 20px;
        }
        .menu-btn { 
            padding: 20px 30px; 
            font-size: 22px;
            cursor: pointer; 
            background: #333; 
            color: white; 
            border: none; 
            font-weight: bold; 
            margin-top: 20px; 
            border-radius: 10px; 
            width: 85%;
        }

        .blink { animation: blink-animation 0.1s steps(2, start) infinite; }
        @keyframes blink-animation { to { visibility: hidden; } }
        .hit-style .car-body, .hit-style .wheel { background: var(--hit-color) !important; }

        .heart-shape {
            position: absolute;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: #cc0000;
            line-height: 1;
        }
    </style>
</head>
<body>

<a href="../" style="position:fixed;top:10px;left:10px;z-index:100;background:#555;color:#fff;padding:8px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-family:'Courier New',Courier,monospace;border:1px solid #888;">← Menu</a>
<div id="lang-switcher" style="position:fixed;top:10px;right:10px;z-index:100;display:flex;gap:4px;">
    <button id="btn-pl" onclick="setLang('pl')" style="background:transparent;border:1px solid #888;border-radius:20px;padding:4px 10px;font-size:1.2rem;cursor:pointer;">🇵🇱</button>
    <button id="btn-en" onclick="setLang('en')" style="background:transparent;border:1px solid #888;border-radius:20px;padding:4px 10px;font-size:1.2rem;cursor:pointer;">🇬🇧</button>
</div>

<div id="console">
    <div id="screen-border">
        <div id="screen">
            <div id="ui">
                <div id="hi-score">HI: 0000</div>
                <div id="score">0000</div>
                <div id="lives">♥♥♥</div>
            </div>
            
            <div id="overlay">
                <h1 id="status-title" style="margin:0; font-size: 32px;">AUTOSLALOM</h1>
                <p id="final-info" style="font-size: 14px; margin: 15px 0;">TRYB SPOKOJNY<br>Have Fun!!!</p>
                <button class="menu-btn" id="action-btn" onclick="startGame()">START</button>
            </div>

            <div id="player" class="car-shape" style="bottom: 30px; display: none;">
                <div class="wheel w1"></div><div class="wheel w2"></div>
                <div class="car-body"></div>
                <div class="wheel w3"></div><div class="wheel w4"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="handleMove('L')">LEWO</button>
        <button class="btn" onclick="handleMove('P')">PRAWO</button>
        <button class="btn-reset" onclick="resetHiScore()" id="btn-reset-hi">RESETUJ REKORD</button>
    </div>
</div>

<script>
    const T = {
        pl: {
            easyMode: 'TRYB SPOKOJNY\nHave Fun!!!',
            crash: 'KRAKSA!',
            yourScore: 'TWÓJ WYNIK:',
            playAgain: 'ZAGRAJ PONOWNIE',
            resetRecord: 'RESETUJ REKORD',
            confirmReset: 'Wyzerować rekord?'
        },
        en: {
            easyMode: 'EASY MODE\nHave Fun!!!',
            crash: 'CRASH!',
            yourScore: 'YOUR SCORE:',
            playAgain: 'PLAY AGAIN',
            resetRecord: 'RESET RECORD',
            confirmReset: 'Reset high score?'
        }
    };
    const lang = localStorage.getItem('lang') || 'pl';

    function applyLang() {
        const t = T[lang];
        const finalInfoEl = document.getElementById('final-info');
        if (finalInfoEl.dataset.state !== 'end') {
            finalInfoEl.innerHTML = t.easyMode.replace('\n', '<br>');
        }
        document.getElementById('btn-reset-hi').innerText = t.resetRecord;
        document.getElementById('btn-pl').style.borderColor = lang === 'pl' ? '#fff' : '#888';
        document.getElementById('btn-en').style.borderColor = lang === 'en' ? '#fff' : '#888';
    }

    function setLang(l) {
        localStorage.setItem('lang', l);
        location.reload();
    }

    applyLang();
    const screen = document.getElementById('screen');
    const player = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const hiScoreEl = document.getElementById('hi-score');
    const livesEl = document.getElementById('lives');
    const overlay = document.getElementById('overlay');
    const statusTitle = document.getElementById('status-title');
    const finalInfo = document.getElementById('final-info');
    const actionBtn = document.getElementById('action-btn');

    let score = 0;
    let hiScore = localStorage.getItem('autoslalom_hi') || 0;
    let lives = 3;
    let playerLane = 1;
    let gameActive = false;
    let obstacles = [];
    let spawnTimer = 0;
    let patternStep = 0;
    let framesOnSameLane = 0;
    let lastLane = 1;
    let lastHeartScore = 0;
    let lastHeartTime = 0;
    const HEART_INTERVAL = 15;
    
    const baseSpeed = 4.8; 
    const initialDifficultyOffset = 0;
    let currentSpeed = baseSpeed + (4 * (baseSpeed * 0.05));
    let lanes = [];

    // Zapobieganie menu kontekstowemu przy długim dotknięciu przycisku
    window.oncontextmenu = function(event) {
        event.preventDefault();
        event.stopPropagation();
        return false;
    };

    function calculateLanes() {
        const sw = screen.clientWidth;
        const carW = 54;
        const padding = (sw - (carW * 4)) / 5;
        lanes = [padding, padding * 2 + carW, padding * 3 + carW * 2, padding * 4 + carW * 3];
    }

    window.addEventListener('resize', calculateLanes);
    calculateLanes();

    function updateHiScoreDisplay() {
        hiScoreEl.innerText = `HI: ${hiScore.toString().padStart(4, '0')}`;
    }
    updateHiScoreDisplay();

    function resetHiScore() {
        if (confirm(T[lang].confirmReset)) {
            hiScore = 0;
            localStorage.setItem('autoslalom_hi', 0);
            updateHiScoreDisplay();
        }
    }

    // Nowa funkcja obsługi ruchu, która zapobiega podwójnemu wywołaniu
    let lastSwipeTime = 0;
    function handleMove(dir) {
        if (!gameActive) return;
        if (dir === 'L' && playerLane > 0) playerLane--;
        if (dir === 'P' && playerLane < 3) playerLane++;
        lastSwipeTime = Date.now();
        updatePlayerPos();
    }

    function updatePlayerPos() { 
        player.style.left = lanes[playerLane] + 'px'; 
    }

    window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowLeft') handleMove('L');
        if(e.key === 'ArrowRight') handleMove('P');
    });

    let touchStartX = null;
    let swipeFired = false;
    screen.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        swipeFired = false;
    }, { passive: true });
    screen.addEventListener('touchmove', (e) => {
        if (touchStartX === null || swipeFired) return;
        const dx = e.touches[0].clientX - touchStartX;
        if (Math.abs(dx) > 15) {
            handleMove(dx < 0 ? 'L' : 'P');
            swipeFired = true;
        }
    }, { passive: true });
    screen.addEventListener('touchend', () => {
        touchStartX = null;
        swipeFired = false;
    }, { passive: true });

    function spawn(laneIdx) {
        const container = document.createElement('div');
        container.className = 'car-shape';
        container.innerHTML = `<div class="wheel w1"></div><div class="wheel w2"></div><div class="car-body"></div><div class="wheel w3"></div><div class="wheel w4"></div>`;
        container.style.top = '-50px';
        container.style.left = lanes[laneIdx] + 'px';
        screen.appendChild(container);
        obstacles.push({ el: container, lane: laneIdx, y: -50 });
    }

    function spawnHeart(laneIdx) {
        const container = document.createElement('div');
        container.className = 'heart-shape';
        container.textContent = '♥';
        container.style.top = '-50px';
        container.style.left = lanes[laneIdx] + 'px';
        screen.appendChild(container);
        obstacles.push({ el: container, lane: laneIdx, y: -50, isHeart: true });
    }

    function gameLoop() {
        if(!gameActive) return;

        spawnTimer++;
        if (playerLane === lastLane) framesOnSameLane++;
        else { framesOnSameLane = 0; lastLane = playerLane; }

        let virtualScore = score + initialDifficultyOffset;
        let spawnRate = Math.max(16, 48 - (virtualScore / 2.5));
        
        if(spawnTimer > spawnRate) {
            if (framesOnSameLane > 80) { spawn(playerLane); framesOnSameLane = 0; }
            else {
                let phase = Math.floor(score / 12) % 3;
                if (phase === 0) { spawn(patternStep % 4); patternStep++; }
                else if (phase === 1) {
                    const p = patternStep % 4;
                    if (p === 0) { spawn(0); spawn(3); }
                    else if (p === 1) { spawn(1); spawn(2); }
                    else if (p === 2) { spawn(0); spawn(1); }
                    else { spawn(2); spawn(3); }
                    patternStep++;
                } else {
                    let l1 = Math.floor(Math.random() * 4);
                    spawn(l1);
                    if (virtualScore > 65) spawn((l1 + 2) % 4);
                }
            }
            spawnTimer = 0;
        }

        const screenH = screen.clientHeight;

        for(let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.y += currentSpeed;
            o.el.style.top = o.y + 'px';

            // Hitbox z zapasem
            if(o.y > screenH - 92 && o.y < screenH - 48 && o.lane === playerLane) {
                if (o.isHeart) {
                    handleHeartCollect(o, i);
                    continue;
                } else if (Date.now() - lastSwipeTime > 250) {
                    handleHit(o, i);
                    continue;
                }
            }

            if(o.y > screenH) {
                if (!o.isHeart) {
                    score++;
                    if(score % 10 === 0) currentSpeed += (baseSpeed * 0.04);
                    scoreEl.innerText = score.toString().padStart(4, '0');

                    if (lives < 3 && score - lastHeartScore >= HEART_INTERVAL && Date.now() - lastHeartTime >= 10000) {
                        const validLanes = [0,1,2,3].filter(l => Math.abs(l - playerLane) >= 2);
                        if (validLanes.length > 0) {
                            const heartLane = validLanes[Math.floor(Math.random() * validLanes.length)];
                            spawnHeart(heartLane);
                            lastHeartScore = score;
                            lastHeartTime = Date.now();
                        }
                    }
                }
                o.el.remove();
                obstacles.splice(i, 1);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    function handleHit(obstacle, index) {
        lives--;
        livesEl.innerText = '♥♥♥'.substring(0, lives);
        obstacle.el.classList.add('blink', 'hit-style');
        player.classList.add('blink', 'hit-style');
        gameActive = false;

        setTimeout(() => {
            obstacle.el.remove();
            obstacles.splice(index, 1);
            player.classList.remove('blink', 'hit-style');
            if(lives <= 0) endGame();
            else { gameActive = true; framesOnSameLane = 0; gameLoop(); }
        }, 800);
    }

    function handleHeartCollect(heart, index) {
        heart.el.remove();
        obstacles.splice(index, 1);
        if (lives < 3) {
            lives++;
            livesEl.innerText = '♥♥♥'.substring(0, lives);
        }
    }

    function startGame() {
        calculateLanes();
        document.querySelectorAll('.car-shape:not(#player), .heart-shape').forEach(o => o.remove());
        obstacles = [];
        score = 0; lives = 3; patternStep = 0; framesOnSameLane = 0; lastHeartScore = 0; lastHeartTime = 0;
        currentSpeed = baseSpeed + (4 * (baseSpeed * 0.05));
        playerLane = 1;
        gameActive = true;
        scoreEl.innerText = '0000';
        livesEl.innerText = '♥♥♥';
        overlay.style.display = 'none';
        player.style.display = 'block';
        updatePlayerPos();
        gameLoop();
    }

    function endGame() {
        gameActive = false;
        if(score > hiScore) {
            hiScore = score;
            localStorage.setItem('autoslalom_hi', hiScore);
            updateHiScoreDisplay();
        }
        statusTitle.innerText = T[lang].crash;
        finalInfo.dataset.state = 'end';
        finalInfo.innerHTML = `${T[lang].yourScore} ${score.toString().padStart(4, '0')}`;
        actionBtn.innerText = T[lang].playAgain;
        overlay.style.display = 'flex';
    }
</script>
</body>
</html>
