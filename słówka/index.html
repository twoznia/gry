<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Angielski CSV - Gra</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        select, button { padding: 12px; margin: 10px 0; width: 100%; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }
        .card { font-size: 28px; font-weight: bold; margin: 20px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; border: 3px solid #007bff; border-radius: 10px; background: #fff; }
        .timer { font-size: 20px; color: #e74c3c; font-weight: bold; margin-bottom: 10px; }
        .hidden { display: none; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .stats-table th, .stats-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .btn-correct { background: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-wrong { background: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-start { background: #3498db; color: white; border: none; cursor: pointer; }
        #answerBox { font-size: 22px; color: #2c3e50; font-weight: bold; padding: 10px; background: #ecf0f1; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container" id="setup">
    <h2>Wybierz lekcję</h2>
    <label>Dostępne tematy (pliki .csv):</label>
    <select id="topicSelect">
        <option value="Technologia">Technologia</option>
        <option value="Dom">Dom</option>
    </select>

    <label>Kierunek:</label>
    <select id="modeSelect">
        <option value="pl_en">Polski -> Angielski</option>
        <option value="en_pl">Angielski -> Polski</option>
    </select>

    <button class="btn-start" onclick="loadAndStart()">Rozpocznij</button>
</div>

<div class="container hidden" id="game">
    <div id="progress" style="margin-bottom: 10px; font-size: 14px; color: #7f8c8d;"></div>
    <div class="timer" id="timer">3</div>
    <div class="card" id="questionBox">...</div>
    <div id="answerBox" class="hidden"></div>
    
    <div id="controls" class="hidden">
        <p>Czy znałeś odpowiedź?</p>
        <button class="btn-correct" onclick="handleAnswer(true)">TAK</button>
        <button class="btn-wrong" onclick="handleAnswer(false)">NIE (powtórz)</button>
    </div>
</div>

<div class="container hidden" id="results">
    <h2>Wyniki nauki</h2>
    <table class="stats-table" id="statsTable">
        <thead>
            <tr><th>Słowo</th><th>Błędy</th></tr>
        </thead>
        <tbody id="statsBody"></tbody>
    </table>
    <button onclick="location.reload()">Odśwież i wybierz inny temat</button>
</div>

<script>
    let currentQueue = [];
    let errorCount = {};
    let mode = "";
    let timerInterval;

    async function loadAndStart() {
        const topic = document.getElementById('topicSelect').value;
        mode = document.getElementById('modeSelect').value;

        try {
            const response = await fetch(`${topic}.csv`);
            if (!response.ok) throw new Error("Nie znaleziono pliku CSV");
            
            const data = await response.text();
            parseCSV(data);
            
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            nextQuestion();
        } catch (err) {
            alert("Błąd ładowania pliku: " + err.message);
        }
    }

    function parseCSV(text) {
        currentQueue = [];
        const lines = text.split('\n');
        lines.forEach(line => {
            const parts = line.split(',');
            if (parts.length >= 2) {
                const item = { en: parts[0].trim(), pl: parts[1].trim() };
                currentQueue.push(item);
                errorCount[item.en] = 0;
            }
        });
        // Losowa kolejność na start
        currentQueue.sort(() => Math.random() - 0.5);
    }

    function nextQuestion() {
        if (currentQueue.length === 0) {
            showResults();
            return;
        }

        document.getElementById('progress').innerText = `Pozostało słów: ${currentQueue.length}`;
        const item = currentQueue[0];
        const displayWord = (mode === "pl_en") ? item.pl : item.en;
        const answerWord = (mode === "pl_en") ? item.en : item.pl;

        document.getElementById('questionBox').innerText = displayWord;
        document.getElementById('answerBox').innerText = answerWord;
        document.getElementById('answerBox').classList.add('hidden');
        document.getElementById('controls').classList.add('hidden');
        
        startTimer(3);
    }

    function startTimer(seconds) {
        let timeLeft = seconds;
        const timerEl = document.getElementById('timer');
        timerEl.innerText = timeLeft;
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                revealAnswer();
            }
        }, 1000);
    }

    function revealAnswer() {
        document.getElementById('answerBox').classList.remove('hidden');
        document.getElementById('controls').classList.remove('hidden');
    }

    function handleAnswer(isCorrect) {
        const item = currentQueue.shift();

        if (isCorrect) {
            // Słowo znane - usuwamy z kolejki
        } else {
            errorCount[item.en]++;
            currentQueue.push(item); // Wraca na koniec
        }

        nextQuestion();
    }

    function showResults() {
        document.getElementById('game').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        
        const statsBody = document.getElementById('statsBody');
        const sorted = Object.entries(errorCount)
            .filter(e => e[1] > 0)
            .sort((a, b) => b[1] - a[1]);

        if (sorted.length === 0) {
            statsBody.innerHTML = "<tr><td colspan='2'>Idealnie! Zero błędów.</td></tr>";
        } else {
            sorted.forEach(([word, count]) => {
                const row = `<tr><td>${word}</td><td>${count}</td></tr>`;
                statsBody.innerHTML += row;
            });
        }
    }
</script>

</body>
</html>
