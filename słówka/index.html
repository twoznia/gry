<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trener Słówek - Hybryda</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --danger: #d63031; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 480px; text-align: center; }
        h2 { margin-top: 0; color: #2d3436; }
        .setup-group { text-align: left; margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; font-size: 0.85rem; color: #636e72; }
        select, input, button { padding: 12px; width: 100%; border-radius: 10px; border: 2px solid #dfe6e9; font-size: 1rem; box-sizing: border-box; }
        .card { font-size: 2rem; font-weight: 800; margin: 25px 0; padding: 50px 20px; border: 3px solid var(--primary); border-radius: 15px; background: #fff; min-height: 120px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .timer-bar { height: 6px; background: var(--danger); width: 100%; position: absolute; bottom: 0; left: 0; }
        .btn-main { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-correct { background: var(--success); color: white; border: none; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .btn-wrong { background: var(--danger); color: white; border: none; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .countdown-text { margin-top: 8px; font-size: 0.95rem; font-weight: 700; color: var(--danger); min-height: 1.2em; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        .stats-table th, .stats-table td { padding: 12px; border-bottom: 1px solid #dfe6e9; }
        .history-item { font-size: 0.8rem; padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        #loader { font-size: 0.8rem; color: var(--primary); margin-bottom: 10px; font-weight: bold; }
        .local-reuse-box { margin-bottom: 12px; padding: 12px; border: 1px solid #dfe6e9; border-radius: 12px; background: #f8f9fb; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
        .word-stack { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .word-main { line-height: 1.1; }
        .word-meta { font-size: 0.95rem; font-weight: 600; color: #636e72; }
        @media (prefers-reduced-motion: reduce) {
            .timer-bar { transition: none !important; }
        }
    </style>
</head>
<body>

<div class="container" id="setup">
    <h2><img src="https://flagcdn.com/24x18/gb.png" width="24" height="18" alt="" aria-hidden="true" style="display:inline-block;vertical-align:middle;border-radius:3px;margin-right:8px;">Trener Słówek</h2>
    <div id="loader">Inicjalizacja...</div>

    <div class="setup-group">
        <label>Źródło słówek:</label>
        <select id="sourceSelect" onchange="toggleSource()">
            <option value="github">Gra</option>
            <option value="local">Plik lokalny z PC</option>
        </select>
    </div>

    <!-- Sekcja GitHub -->
    <div id="githubSection">
        <div class="setup-group">
            <label>Kategoria:</label>
            <select id="categorySelect" onchange="loadSubcategories()" disabled>
                <option value="">Wybierz kategorię...</option>
            </select>
        </div>
        <div class="setup-group">
            <label>Zestaw:</label>
            <select id="subcategorySelect" onchange="handleSubcategoryChange()" disabled>
                <option value="">Najpierw wybierz kategorię</option>
            </select>
        </div>
        <div class="setup-group hidden" id="levelFilterGroup">
            <label for="levelSelect">Poziom:</label>
            <select id="levelSelect" disabled>
                <option value="__all__">Wszystkie poziomy</option>
            </select>
        </div>
        <div class="setup-group hidden" id="wordCountGroup">
            <label for="wordCountSelect">Ilość słówek:</label>
            <select id="wordCountSelect" disabled>
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="30">30</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="__all__">Wszystkie</option>
            </select>
        </div>
    </div>

    <!-- Sekcja Lokalna -->
    <div id="localSection" class="hidden">
        <div id="localReuseBox" class="local-reuse-box hidden">
            <div id="localReuseText" style="font-size: 0.9rem; color: #2d3436;"></div>
            <button type="button" class="btn-secondary" onclick="reuseLastLocalFile()">Użyj ostatniego pliku</button>
        </div>
        <div class="setup-group">
            <label>Wybierz plik CSV (format: en,pl lub english,polish,type,level):</label>
            <input type="file" id="fileInput" accept=".csv" onchange="selectNewLocalFile()">
        </div>
    </div>

    <div class="setup-group">
        <label>Kierunek nauki:</label>
        <select id="modeSelect">
            <option value="pl_en">Polski → Angielski</option>
            <option value="en_pl">Angielski → Polski</option>
        </select>
    </div>

    <div class="setup-group">
        <label for="delaySelect">Czas przed pokazaniem odpowiedzi:</label>
        <select id="delaySelect">
            <option value="3000">3 sekundy</option>
            <option value="5000">5 sekund</option>
            <option value="8000">8 sekund</option>
        </select>
    </div>

    <button class="btn-main" id="startBtn" onclick="startGame()">Rozpocznij sesję</button>

    <div id="historyContainer" class="setup-group hidden" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
        <label>Ostatnie sesje:</label>
        <div id="historyList"></div>
    </div>
</div>

<div class="container hidden" id="game">
    <button type="button" class="btn-secondary" onclick="returnToMenu()" aria-label="Powrót do menu">← Menu</button>
    <div id="progress" style="color: #b2bec3; font-weight: bold;"></div>
    <div id="countdownText" class="countdown-text" aria-hidden="true"></div>
    <div id="countdownStatus" class="sr-only" aria-live="polite"></div>
    <div class="card">
        <div id="questionBox"></div>
        <div id="timerBar" class="timer-bar" role="progressbar" aria-label="Odliczanie do pokazania odpowiedzi" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100"></div>
    </div>
    <div id="answerBox" class="hidden" tabindex="0" style="font-size: 1.4rem; font-weight: bold; background: #f1f2f6; padding: 15px; border-radius: 10px; margin-bottom: 20px;"></div>

    <div id="quickActions">
        <button type="button" class="btn-correct" onclick="revealAnswer(false)" aria-label="Odsłoń odpowiedź - wiem">✓ Wiem</button>
    </div>
    <div id="controls" class="hidden">
        <button class="btn-correct" onclick="submitResult(true)">✓ Wiedziałem</button>
        <button class="btn-wrong" onclick="submitResult(false)">✗ Do powtórki</button>
    </div>
</div>

<div class="container hidden" id="results">
    <h2>Wyniki nauki 📈</h2>
    <div id="statsContent"></div>
    <button class="btn-main" onclick="returnToMenu()">Nowa sesja</button>
</div>

<script>
    const MANIFEST_PATH = 'data/manifest.json';
    const OXFORD_CATEGORY_NAME = 'Oxford3000';
    const HEADER_WITH_METADATA = 'english,polish,type,level';
    const LEVEL_ORDER = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
    const ALL_WORDS_VALUE = '__all__';

    let sessionQueue = [];
    let fails = {};
    let mode = "";
    let totalInitialWords = 0;
    let completedCount = 0;
    let answerDelayMs = 3000;
    let revealTimeoutId = null;
    let revealIntervalId = null;
    let currentSource = 'github';
    let currentSessionFileName = '';
    let lastLocalCsvText = '';
    let lastLocalFileName = '';
    let reuseLastLocalSelection = false;
    let wordsManifest = null;
    let sessionItemsById = {};
    const levelOptionsCache = new Map();

    // 1. Inicjalizacja i obsługa źródeł
    async function init() {
        displayHistory();
        try {
            const response = await fetch(MANIFEST_PATH, { cache: 'no-store' });
            if (!response.ok) throw new Error(`Manifest unavailable: ${response.status}`);

            const manifest = await response.json();
            if (!Array.isArray(manifest.categories) || manifest.categories.length === 0) {
                throw new Error('Manifest does not contain categories.');
            }

            wordsManifest = manifest;
            const select = document.getElementById('categorySelect');
            select.innerHTML = '<option value="">Wybierz kategorię...</option>';
            wordsManifest.categories.forEach(category => select.add(new Option(category.name, category.name)));
            select.disabled = false;
            document.getElementById('loader').innerText = "";
            document.getElementById('loader').classList.add('hidden');
        } catch (e) {
            handleManifestError();
        }
    }

    function handleManifestError() {
        wordsManifest = null;
        document.getElementById('loader').innerText = "Nie udało się wczytać listy słówek. Wybierz plik lokalny albo spróbuj później.";
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('categorySelect').innerHTML = '<option value="">Manifest niedostępny</option>';
        const subSelect = document.getElementById('subcategorySelect');
        subSelect.innerHTML = '<option value="">Manifest niedostępny</option>';
        subSelect.disabled = true;
        resetLevelFilter();
        resetWordCountFilter();
    }

    function toggleSource() {
        const source = document.getElementById('sourceSelect').value;
        document.getElementById('githubSection').classList.toggle('hidden', source !== 'github');
        document.getElementById('localSection').classList.toggle('hidden', source !== 'local');
        if (source !== 'github') {
            resetLevelFilter();
            resetWordCountFilter();
        } else if (document.getElementById('categorySelect').value === OXFORD_CATEGORY_NAME) {
            handleSubcategoryChange();
        }
        if (source === 'local') updateLocalReuseBox();
    }

    async function loadSubcategories() {
        const cat = document.getElementById('categorySelect').value;
        const subSelect = document.getElementById('subcategorySelect');
        subSelect.disabled = true;
        if (!wordsManifest) {
            handleManifestError();
            return;
        }

        const category = wordsManifest.categories.find(item => item.name === cat);
        const sets = Array.isArray(category?.sets) ? category.sets : [];
        subSelect.innerHTML = '';

        if (sets.length === 0) {
            subSelect.add(new Option('Brak zestawów w tej kategorii', ''));
            resetLevelFilter();
            resetWordCountFilter();
            return;
        }

        sets.forEach(set => {
            const option = new Option(set.name, encodeURI(set.path));
            option.dataset.filename = set.fileName;
            subSelect.add(option);
        });
        subSelect.disabled = false;
        await handleSubcategoryChange();
    }

    async function handleSubcategoryChange() {
        const source = document.getElementById('sourceSelect').value;
        const category = document.getElementById('categorySelect').value;
        const selectedPath = document.getElementById('subcategorySelect').value;
        if (source !== 'github' || category !== OXFORD_CATEGORY_NAME || !selectedPath) {
            resetLevelFilter();
            resetWordCountFilter();
            return;
        }

        showWordCountFilter();
        await populateLevelFilter(selectedPath);
    }

    async function populateLevelFilter(csvPath) {
        const levelGroup = document.getElementById('levelFilterGroup');
        const levelSelect = document.getElementById('levelSelect');
        let levels = levelOptionsCache.get(csvPath);

        if (!levels) {
            const response = await fetch(csvPath);
            if (!response.ok) {
                resetLevelFilter();
                return;
            }
            const csvText = await response.text();
            levels = getAvailableLevels(parseCsvText(csvText));
            levelOptionsCache.set(csvPath, levels);
        }

        levelSelect.innerHTML = `<option value="${ALL_WORDS_VALUE}">Wszystkie poziomy</option>`;
        levels.forEach(level => levelSelect.add(new Option(level, level)));
        levelSelect.disabled = false;
        levelGroup.classList.remove('hidden');
    }

    function resetLevelFilter() {
        const levelGroup = document.getElementById('levelFilterGroup');
        const levelSelect = document.getElementById('levelSelect');
        levelSelect.innerHTML = `<option value="${ALL_WORDS_VALUE}">Wszystkie poziomy</option>`;
        levelSelect.value = ALL_WORDS_VALUE;
        levelSelect.disabled = true;
        levelGroup.classList.add('hidden');
    }

    function showWordCountFilter() {
        const wordCountGroup = document.getElementById('wordCountGroup');
        const wordCountSelect = document.getElementById('wordCountSelect');
        wordCountSelect.disabled = false;
        wordCountGroup.classList.remove('hidden');
    }

    function resetWordCountFilter() {
        const wordCountGroup = document.getElementById('wordCountGroup');
        const wordCountSelect = document.getElementById('wordCountSelect');
        wordCountSelect.value = '20';
        wordCountSelect.disabled = true;
        wordCountGroup.classList.add('hidden');
    }

    // 2. Start Gry
    async function startGame() {
        const source = document.getElementById('sourceSelect').value;
        mode = document.getElementById('modeSelect').value;
        answerDelayMs = Number(document.getElementById('delaySelect').value) || 3000;
        currentSource = source;
        let csvText = "";

        if (source === 'local') {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                csvText = await file.text();
                lastLocalCsvText = csvText;
                lastLocalFileName = file.name;
                reuseLastLocalSelection = false;
                currentSessionFileName = file.name;
            } else if (reuseLastLocalSelection && lastLocalCsvText) {
                csvText = lastLocalCsvText;
                currentSessionFileName = lastLocalFileName;
            } else {
                return alert("Wybierz plik lub użyj ostatnio załadowanego.");
            }
        } else {
            if (!wordsManifest) return alert("Manifest słówek jest niedostępny. Wybierz plik lokalny albo spróbuj później.");
            const url = document.getElementById('subcategorySelect').value;
            if (!url) return alert("Wybierz zestaw!");
            const res = await fetch(url);
            csvText = await res.text();
            const selectedOption = document.getElementById('subcategorySelect').selectedOptions[0];
            currentSessionFileName = selectedOption?.dataset.filename || selectedOption?.textContent || '';
        }

        sessionQueue = parseCsvText(csvText);

        let selectedLevel = ALL_WORDS_VALUE;
        if (source === 'github' && document.getElementById('categorySelect').value === OXFORD_CATEGORY_NAME) {
            selectedLevel = document.getElementById('levelSelect').value;
            if (selectedLevel && selectedLevel !== ALL_WORDS_VALUE) {
                sessionQueue = sessionQueue.filter(item => item.level === selectedLevel);
            }
            sessionQueue = applyOxfordWordLimit(sessionQueue);
        }

        if (sessionQueue.length === 0) {
            const message = selectedLevel && selectedLevel !== ALL_WORDS_VALUE
                ? `Brak słówek dla poziomu ${selectedLevel}.`
                : 'Wybrany zestaw nie zawiera słówek.';
            return alert(message);
        }

        fails = {};
        sessionItemsById = {};
        totalInitialWords = sessionQueue.length;
        completedCount = 0;
        sessionQueue.forEach(item => {
            fails[item.id] = 0;
            sessionItemsById[item.id] = item;
        });
        sessionQueue.sort(() => Math.random() - 0.5);

        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        renderCard();
    }

    // 3. Logika Rozgrywki (z cechami wersji lokalnej)
    function renderCard() {
        if (sessionQueue.length === 0) return showResults();
        const item = sessionQueue[0];
        document.getElementById('progress').innerText = `Postęp: ${completedCount} / ${totalInitialWords} • Błędy: ${getErrorCount()}`;
        setWordContent(document.getElementById('questionBox'), mode === 'pl_en' ? item.pl : item.en, mode === 'en_pl' ? item.type : '');
        setWordContent(document.getElementById('answerBox'), mode === 'pl_en' ? item.en : item.pl, mode === 'pl_en' ? item.type : '');
        
        document.getElementById('answerBox').classList.add('hidden');
        document.getElementById('controls').classList.add('hidden');
        document.getElementById('quickActions').classList.remove('hidden');
        startRevealCountdown();
    }

    function submitResult(isCorrect) {
        clearTimeout(revealTimeoutId);
        clearInterval(revealIntervalId);
        const item = sessionQueue.shift();
        if (isCorrect) {
            completedCount++;
        } else {
            fails[item.id]++; // Zliczanie błędów
            sessionQueue.push(item);
        }
        renderCard();
    }

    // 4. Wyniki i Historia
    function showResults() {
        clearTimeout(revealTimeoutId);
        clearInterval(revealIntervalId);
        document.getElementById('game').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        document.getElementById('countdownText').textContent = '';

        // Zapis do historii lokalnej
        let history = JSON.parse(localStorage.getItem('studyHistory') || "[]");
        history.unshift({ date: new Date().toLocaleDateString(), count: totalInitialWords });
        localStorage.setItem('studyHistory', JSON.stringify(history.slice(0, 5)));

        // Tabela błędów (jak w oryginale)[cite: 1]
        const sorted = Object.entries(fails).filter(f => f[1] > 0).sort((a,b) => b[1] - a[1]);
        let html = `<h3>Podsumowanie</h3><p>Statystyka dla pliku: <b>${escapeHtml(currentSessionFileName || 'Nieznany plik')}</b></p><table class="stats-table"><tr><th>Słowo</th><th>Błędy</th></tr>`;
        if (sorted.length === 0) html += `<tr><td colspan="2">Bez błędów! Brawo!</td></tr>`;
        else sorted.forEach(([id, count]) => {
            const item = sessionItemsById[id];
            html += `<tr><td>${escapeHtml(formatWordSummary(item))}</td><td>${count}</td></tr>`;
        });
        document.getElementById('statsContent').innerHTML = html + `</table>`;
    }

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem('studyHistory') || "[]");
        if (history.length > 0) {
            document.getElementById('historyContainer').classList.remove('hidden');
            document.getElementById('historyList').innerHTML = history.map(h => `
                <div class="history-item"><span>${h.date}</span><b>${h.count} słówek</b></div>
            `).join('');
        }
    }

    function startRevealCountdown() {
        clearTimeout(revealTimeoutId);
        clearInterval(revealIntervalId);

        const timerBar = document.getElementById('timerBar');
        const countdownText = document.getElementById('countdownText');
        const countdownStatus = document.getElementById('countdownStatus');
        const seconds = Math.round(answerDelayMs / 1000);
        timerBar.style.transition = 'none';
        timerBar.style.width = '100%';
        timerBar.setAttribute('aria-valuenow', '100');
        countdownText.textContent = `Odpowiedź za ${seconds} s`;
        countdownStatus.textContent = `Odpowiedź pojawi się za ${seconds} ${formatSecondsLabel(seconds)}.`;

        requestAnimationFrame(() => {
            const startTime = Date.now();
            timerBar.style.transition = `width ${answerDelayMs}ms linear`;
            timerBar.style.width = '0%';

            revealIntervalId = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const remainingPercent = Math.max(0, 100 - Math.round((elapsed / answerDelayMs) * 100));
                const remainingSeconds = Math.max(0, Math.ceil((answerDelayMs - elapsed) / 1000));
                timerBar.setAttribute('aria-valuenow', String(remainingPercent));
                countdownText.textContent = `Odpowiedź za ${remainingSeconds} s`;
                countdownStatus.textContent = `Odpowiedź pojawi się za ${remainingSeconds} ${formatSecondsLabel(remainingSeconds)}.`;
            }, 1000);
        });

        revealTimeoutId = setTimeout(() => revealAnswer(true), answerDelayMs);
    }

    function formatSecondsLabel(seconds) {
        if (seconds === 1) return 'sekundę';
        if (seconds >= 2 && seconds <= 4) return 'sekundy';
        return 'sekund';
    }

    function getErrorCount() {
        return Object.values(fails).reduce((sum, count) => sum + count, 0);
    }

    function getSelectedWordLimit() {
        const selectedValue = document.getElementById('wordCountSelect').value;
        if (selectedValue === ALL_WORDS_VALUE) return null;

        const parsedValue = Number(selectedValue);
        return Number.isFinite(parsedValue) && parsedValue > 0 ? parsedValue : 20;
    }

    function applyOxfordWordLimit(words) {
        const wordLimit = getSelectedWordLimit();
        if (!wordLimit || words.length <= wordLimit) return shuffleWords(words);
        return shuffleWords(words).slice(0, wordLimit);
    }

    function shuffleWords(words) {
        const shuffledWords = [...words];
        for (let index = shuffledWords.length - 1; index > 0; index--) {
            const randomIndex = Math.floor(Math.random() * (index + 1));
            [shuffledWords[index], shuffledWords[randomIndex]] = [shuffledWords[randomIndex], shuffledWords[index]];
        }
        return shuffledWords;
    }

    function revealAnswer(focusAnswer = false) {
        clearTimeout(revealTimeoutId);
        clearInterval(revealIntervalId);

        const timerBar = document.getElementById('timerBar');
        const countdownText = document.getElementById('countdownText');
        const countdownStatus = document.getElementById('countdownStatus');
        timerBar.style.transition = 'none';
        timerBar.style.width = '0%';
        timerBar.setAttribute('aria-valuenow', '0');
        countdownText.textContent = 'Odpowiedź pokazana';
        document.getElementById('answerBox').classList.remove('hidden');
        document.getElementById('controls').classList.remove('hidden');
        document.getElementById('quickActions').classList.add('hidden');
        if (focusAnswer) {
            document.getElementById('answerBox').focus();
        }
        countdownStatus.textContent = 'Poprawna odpowiedź została pokazana.';
    }

    function updateLocalReuseBox() {
        const reuseBox = document.getElementById('localReuseBox');
        const reuseText = document.getElementById('localReuseText');
        if (!lastLocalCsvText || !lastLocalFileName) {
            reuseBox.classList.add('hidden');
            return;
        }

        reuseText.innerText = reuseLastLocalSelection
            ? `Wybrano ponowne użycie pliku ${lastLocalFileName}. Możesz też wskazać inny plik poniżej.`
            : `Ostatni plik: ${lastLocalFileName}. Możesz użyć go ponownie albo wybrać inny plik poniżej.`;
        reuseBox.classList.remove('hidden');
    }

    function reuseLastLocalFile() {
        if (!lastLocalCsvText) return;
        reuseLastLocalSelection = true;
        document.getElementById('fileInput').value = '';
        updateLocalReuseBox();
    }

    function selectNewLocalFile() {
        reuseLastLocalSelection = false;
        updateLocalReuseBox();
    }

    function parseCsvText(csvText) {
        const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
        const hasMetadataHeader = normalizeHeader(lines[0]) === HEADER_WITH_METADATA;
        const dataLines = hasMetadataHeader ? lines.slice(1) : lines;

        return dataLines
            .filter(line => line.includes(','))
            .map((line, index) => parseCsvRow(line, index))
            .filter(item => item && item.en && item.pl);
    }

    function parseCsvRow(line, index) {
        const columns = line.split(',').map(value => value.trim());
        if (columns.length < 2) return null;

        const [en, pl, type = '', level = ''] = columns;
        return {
            id: `${en}__${pl}__${type}__${level}__${index}`,
            en,
            pl,
            type,
            level
        };
    }

    function normalizeHeader(line = '') {
        return line.toLowerCase().replace(/\s+/g, '');
    }

    function getAvailableLevels(words) {
        return [...new Set(words.map(item => item.level).filter(Boolean))]
            .sort((a, b) => {
                const left = LEVEL_ORDER.indexOf(a);
                const right = LEVEL_ORDER.indexOf(b);
                if (left !== -1 || right !== -1) {
                    if (left === -1) return 1;
                    if (right === -1) return -1;
                    return left - right;
                }
                return a.localeCompare(b, 'pl');
            });
    }

    function setWordContent(element, word, type = '') {
        const safeWord = escapeHtml(word || '');
        if (!type) {
            element.textContent = word || '';
            return;
        }

        element.innerHTML = `
            <div class="word-stack">
                <div class="word-main">${safeWord}</div>
                <div class="word-meta">(${escapeHtml(type)})</div>
            </div>
        `;
    }

    function formatWordSummary(item) {
        if (!item) return '';
        return item.type ? `${item.en} (${item.type})` : item.en;
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function returnToMenu() {
        clearTimeout(revealTimeoutId);
        clearInterval(revealIntervalId);
        sessionQueue = [];
        fails = {};
        sessionItemsById = {};
        totalInitialWords = 0;
        completedCount = 0;
        currentSessionFileName = '';

        document.getElementById('results').classList.add('hidden');
        document.getElementById('game').classList.add('hidden');
        document.getElementById('setup').classList.remove('hidden');
        document.getElementById('statsContent').innerHTML = '';
        document.getElementById('countdownText').textContent = '';
        document.getElementById('countdownStatus').textContent = '';
        document.getElementById('answerBox').classList.add('hidden');
        document.getElementById('controls').classList.add('hidden');
        document.getElementById('quickActions').classList.remove('hidden');
        document.getElementById('timerBar').style.transition = 'none';
        document.getElementById('timerBar').style.width = '100%';
        document.getElementById('timerBar').setAttribute('aria-valuenow', '100');

        toggleSource();
    }

    init();
</script>
</body>
</html>
