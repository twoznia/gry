<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pytanka | @twoznia</title>
    <link rel="stylesheet" href="../shared/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<a class="back-link" href="../">← Wróć</a>

<!-- ========== SETUP SCREEN ========== -->
<section id="screen-setup" class="screen active">
    <div class="game-title">🧠 Pytanka</div>
    <p class="game-subtitle">Quiz dla dzieci z 3 odpowiedziami do wyboru.</p>

    <div class="card">
        <div class="form-group">
            <label for="sel-category">Kategoria</label>
            <select id="sel-category">
                <option value="__random__">🎲 Losowa</option>
            </select>
        </div>
        <div class="form-group">
            <label for="sel-level">Poziom trudności</label>
            <select id="sel-level">
                <option value="__all__">Wszystkie</option>
            </select>
        </div>
        <div class="form-group">
            <label for="sel-questions">Liczba pytań</label>
            <select id="sel-questions">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="15">15</option>
                <option value="20">20</option>
            </select>
        </div>
    </div>

    <div class="error-msg" id="setup-error"></div>
    <button class="btn btn-primary" id="btn-start" disabled>Ładowanie…</button>
</section>

<!-- ========== GAME SCREEN ========== -->
<section id="screen-game" class="screen">
    <div class="hud" style="width:100%;max-width:560px;">
        <span id="q-counter">Pytanie 1 / 10</span>
        <span>Wynik: <span class="score-val" id="score-display">0</span></span>
    </div>
    <div class="progress-bar" id="progress-bar" style="width:100%;max-width:560px;"></div>

    <div class="card" id="top-card">
        <div class="q-meta">
            <div class="q-category-label">Kategoria</div>
            <div class="q-category-name" id="q-category-name"></div>
            <div class="q-subcategory-name" id="q-subcategory-name"></div>
        </div>
        <div class="q-question" id="q-question"></div>
    </div>

    <div class="answers-grid" id="answers-grid"></div>

    <div class="feedback" id="feedback"></div>

    <button class="btn btn-primary" id="btn-next" style="display:none;">Następne pytanie →</button>
</section>

<!-- ========== RESULTS SCREEN ========== -->
<section id="screen-results" class="screen">
    <div class="game-title">🏆 Wyniki</div>
    <div class="result-score" id="result-score">0</div>
    <div class="result-max" id="result-max">na 10 pytań</div>
    <div class="result-comment" id="result-comment"></div>
    <div class="card result-list" id="result-list"></div>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
        <button class="btn btn-primary" id="btn-replay">Zagraj ponownie</button>
        <a class="btn btn-secondary" href="../">Strona główna</a>
    </div>
</section>

<footer>@twoznia | 2026</footer>

<script src="script.js"></script>
</body>
</html>
