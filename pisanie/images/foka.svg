<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow -->
  <ellipse cx="50" cy="96" rx="24" ry="4" fill="#b0bec5" opacity="0.45"/>
  <!-- Body -->
  <ellipse cx="50" cy="66" rx="28" ry="24" fill="#607D8B" stroke="#455A64" stroke-width="1.5"/>
  <!-- Belly -->
  <ellipse cx="50" cy="68" rx="17" ry="15" fill="#90A4AE"/>
  <!-- Head -->
  <circle cx="50" cy="30" r="22" fill="#607D8B" stroke="#455A64" stroke-width="1.5"/>
  <!-- Forehead shine -->
  <ellipse cx="50" cy="20" rx="9" ry="6" fill="#78909C" opacity="0.5"/>
  <!-- Eyes -->
  <circle cx="38" cy="26" r="5" fill="#1a1a1a"/>
  <circle cx="62" cy="26" r="5" fill="#1a1a1a"/>
  <circle cx="39" cy="24.5" r="1.8" fill="white"/>
  <circle cx="63" cy="24.5" r="1.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="36" rx="5" ry="3.5" fill="#37474F"/>
  <!-- Whiskers -->
  <line x1="42" y1="33" x2="24" y2="29" stroke="#546E7A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="36" x2="22" y2="36" stroke="#546E7A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="33" x2="76" y2="29" stroke="#546E7A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="36" x2="78" y2="36" stroke="#546E7A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left flipper -->
  <ellipse cx="18" cy="68" rx="8" ry="15" fill="#546E7A" stroke="#455A64" stroke-width="1" transform="rotate(-25 18 68)"/>
  <!-- Right flipper -->
  <ellipse cx="82" cy="68" rx="8" ry="15" fill="#546E7A" stroke="#455A64" stroke-width="1" transform="rotate(25 82 68)"/>
  <!-- Tail flippers -->
  <ellipse cx="36" cy="90" rx="12" ry="6" fill="#546E7A" stroke="#455A64" stroke-width="1" transform="rotate(-15 36 90)"/>
  <ellipse cx="64" cy="90" rx="12" ry="6" fill="#546E7A" stroke="#455A64" stroke-width="1" transform="rotate(15 64 90)"/>
</svg>
