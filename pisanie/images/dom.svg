<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shadow -->
  <ellipse cx="50" cy="97" rx="30" ry="4" fill="#b0bec5" opacity="0.4"/>
  <!-- Walls -->
  <rect x="15" y="52" width="70" height="42" rx="2" fill="#FFF176" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Roof -->
  <polygon points="8,54 50,14 92,54" fill="#E53935" stroke="#B71C1C" stroke-width="1.5"/>
  <!-- Roof shine -->
  <polygon points="18,54 50,20 60,34 28,54" fill="#EF9A9A" opacity="0.35"/>
  <!-- Chimney -->
  <rect x="65" y="22" width="9" height="22" rx="1" fill="#795548" stroke="#4E342E" stroke-width="1"/>
  <!-- Chimney smoke -->
  <path d="M69,22 Q66,16 70,12 Q74,8 71,3" stroke="#B0BEC5" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Door -->
  <rect x="38" y="66" width="24" height="28" rx="3" fill="#795548" stroke="#4E342E" stroke-width="1.5"/>
  <rect x="40" y="68" width="9" height="13" rx="1" fill="#A1887F" opacity="0.6"/>
  <rect x="51" y="68" width="9" height="13" rx="1" fill="#A1887F" opacity="0.6"/>
  <!-- Door knob -->
  <circle cx="46" cy="83" r="2" fill="#FFD54F"/>
  <!-- Left window -->
  <rect x="18" y="60" width="16" height="14" rx="2" fill="#81D4FA" stroke="#4FC3F7" stroke-width="1.2"/>
  <line x1="26" y1="60" x2="26" y2="74" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="18" y1="67" x2="34" y2="67" stroke="#4FC3F7" stroke-width="1"/>
  <!-- Right window -->
  <rect x="66" y="60" width="16" height="14" rx="2" fill="#81D4FA" stroke="#4FC3F7" stroke-width="1.2"/>
  <line x1="74" y1="60" x2="74" y2="74" stroke="#4FC3F7" stroke-width="1"/>
  <line x1="66" y1="67" x2="82" y2="67" stroke="#4FC3F7" stroke-width="1"/>
</svg>