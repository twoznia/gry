<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wall -->
  <rect x="5" y="5" width="90" height="90" rx="4" fill="#FFF8E7"/>
  <!-- Window outer frame -->
  <rect x="10" y="10" width="80" height="80" rx="5" fill="#8D6E63" stroke="#6D4C41" stroke-width="2"/>
  <!-- Top-left pane -->
  <rect x="14" y="14" width="33" height="33" rx="2" fill="#87CEEB"/>
  <rect x="14" y="14" width="15" height="14" rx="1" fill="#B3E5FC" opacity="0.6"/>
  <!-- Top-right pane -->
  <rect x="53" y="14" width="33" height="33" rx="2" fill="#87CEEB"/>
  <rect x="53" y="14" width="15" height="14" rx="1" fill="#B3E5FC" opacity="0.6"/>
  <!-- Bottom-left pane -->
  <rect x="14" y="53" width="33" height="33" rx="2" fill="#87CEEB"/>
  <!-- Bottom-right pane -->
  <rect x="53" y="53" width="33" height="33" rx="2" fill="#87CEEB"/>
  <!-- Horizontal divider -->
  <rect x="10" y="45" width="80" height="10" fill="#8D6E63" stroke="#6D4C41" stroke-width="0.5"/>
  <!-- Vertical divider -->
  <rect x="45" y="10" width="10" height="80" fill="#8D6E63" stroke="#6D4C41" stroke-width="0.5"/>
  <!-- Handle dot -->
  <circle cx="50" cy="50" r="4" fill="#A1887F"/>
  <circle cx="50" cy="50" r="2" fill="#6D4C41"/>
</svg>
