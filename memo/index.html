<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memo 🧩</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 10px 28px;
            color: white;
            touch-action: manipulation;
            user-select: none;
        }

        /* ── Back button ── */
        #back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 200;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 10px;
            padding: 7px 13px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
        }
        #back-btn:hover { background: rgba(255,255,255,0.25); }

        /* ── Language switcher ── */
        #lang-switcher {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 200;
            display: flex;
            gap: 6px;
        }
        #lang-switcher button {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 20px;
            padding: 4px 10px;
            cursor: pointer;
            line-height: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Screens ── */
        .screen {
            display: none;
            width: 100%;
            max-width: 960px;
            flex-direction: column;
            align-items: center;
        }
        .screen.active { display: flex; }

        /* ══════════════════════════════════
           SETUP SCREEN
        ══════════════════════════════════ */
        #screen-setup {
            gap: 1.25rem;
            padding-top: 4rem;
        }

        .game-title {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 0 30px rgba(99, 179, 237, 0.5);
        }

        .setup-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 18px;
            padding: 1.25rem 1.5rem;
            width: 100%;
            max-width: 480px;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.75rem;
        }

        /* type buttons */
        .type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.65rem;
        }
        .type-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 0.65rem 0.5rem;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .type-btn:hover { background: rgba(255,255,255,0.15); }
        .type-btn.selected {
            background: rgba(56, 189, 248, 0.25);
            border-color: #38bdf8;
        }

        /* size buttons */
        .size-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
        }
        .size-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 0.5rem 0.2rem;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .size-btn:hover { background: rgba(255,255,255,0.15); }
        .size-btn.selected {
            background: rgba(56, 189, 248, 0.25);
            border-color: #38bdf8;
        }
        .size-btn .size-label { font-size: 0.85rem; font-weight: 700; }
        .size-btn .size-record { font-size: 0.68rem; color: rgba(255,255,255,0.55); margin-top: 3px; }

        /* start button */
        .start-btn {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0.85rem 2.75rem;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 24px rgba(14, 165, 233, 0.4);
            -webkit-tap-highlight-color: transparent;
        }
        .start-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* ══════════════════════════════════
           GAME SCREEN
        ══════════════════════════════════ */
        #screen-game {
            padding-top: 3.5rem;
            gap: 0.75rem;
            align-items: center;
        }

        #hud {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            font-size: 1.4rem;
            font-weight: 800;
        }

        #pairs-counter {
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255,255,255,0.65);
        }

        #board {
            display: grid;
            gap: 7px;
            padding: 0.5rem;
        }

        /* ── Card ── */
        .card {
            perspective: 700px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-front {
            background: linear-gradient(135deg, #1e3a5f, #0f2c4a);
            border: 2px solid rgba(255,255,255,0.15);
        }
        .card-front-symbol {
            font-size: inherit;
            color: rgba(255,255,255,0.25);
            font-weight: 900;
            line-height: 1;
        }
        .card-back {
            background: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            transform: rotateY(180deg);
        }
        .card-back .emoji-content {
            line-height: 1;
        }
        .card-back img {
            max-width: 78%;
            max-height: 78%;
            object-fit: contain;
            border-radius: 3px;
            display: block;
        }

        /* Matched state */
        .card.matched .card-back {
            border-color: #22c55e;
            box-shadow: 0 0 14px rgba(34, 197, 94, 0.55);
        }
        .card.matched .card-inner { transition: none; }
        .card.no-click { cursor: default; pointer-events: none; }
        .card.empty { visibility: hidden; pointer-events: none; }

        /* ══════════════════════════════════
           WIN SCREEN
        ══════════════════════════════════ */
        #screen-win {
            gap: 1.25rem;
            padding-top: 5rem;
            align-items: center;
            text-align: center;
        }
        .win-emoji { font-size: 5rem; line-height: 1; }
        .win-title { font-size: 2rem; font-weight: 900; }
        .win-time { font-size: 3.5rem; font-weight: 900; color: #fbbf24; letter-spacing: -2px; }
        .win-record { font-size: 1rem; color: rgba(255,255,255,0.65); }
        .win-record.new-record { color: #fbbf24; font-size: 1.2rem; font-weight: 700; }

        .win-btns {
            display: flex;
            gap: 0.85rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.5rem;
        }
        .btn {
            padding: 0.65rem 1.5rem;
            border-radius: 24px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: white;
            border: none;
            box-shadow: 0 4px 18px rgba(14, 165, 233, 0.35);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.12);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }

        /* ── Responsive tweaks ── */
        @media (max-width: 520px) {
            .game-title { font-size: 1.9rem; }
            .setup-card { padding: 1rem; }
            .size-grid { grid-template-columns: repeat(5, 1fr); gap: 0.35rem; }
        }
    </style>
</head>
<body>

<a href="../" id="back-btn">← <span id="back-label">Menu</span></a>

<div id="lang-switcher">
    <button id="lang-pl" onclick="setLang('pl')" title="Polski" aria-label="Polski">
        <img src="https://flagcdn.com/24x18/pl.png" width="24" height="18" alt="Polski" style="display:block;border-radius:3px;">
    </button>
    <button id="lang-en" onclick="setLang('en')" title="English" aria-label="English">
        <img src="https://flagcdn.com/24x18/gb.png" width="24" height="18" alt="English" style="display:block;border-radius:3px;">
    </button>
</div>

<!-- ══════════ SETUP SCREEN ══════════ -->
<div id="screen-setup" class="screen active">
    <div class="game-title">🧩 Memo</div>

    <div class="setup-card">
        <div class="section-label" id="lbl-imgtype">Rodzaj obrazków</div>
        <div class="type-grid">
            <button class="type-btn selected" id="type-pisanie" onclick="selectType('pisanie')">
                🖊️ <span id="lbl-type-pisanie">Pisanie</span>
            </button>
            <button class="type-btn" id="type-kraje" onclick="selectType('kraje')">
                🌍 <span id="lbl-type-kraje">Kraje</span>
            </button>
        </div>
    </div>

    <div class="setup-card">
        <div class="section-label" id="lbl-boardsize">Rozmiar planszy</div>
        <div class="size-grid" id="size-grid"></div>
    </div>

    <button class="start-btn" onclick="startGame()">
        <span id="lbl-start">▶ Graj</span>
    </button>
</div>

<!-- ══════════ GAME SCREEN ══════════ -->
<div id="screen-game" class="screen">
    <div id="hud">
        <span id="timer-display">00:00</span>
        <span id="pairs-counter"></span>
    </div>
    <div id="board"></div>
</div>

<!-- ══════════ WIN SCREEN ══════════ -->
<div id="screen-win" class="screen">
    <div class="win-emoji">🎉</div>
    <div class="win-title" id="win-title">Brawo!</div>
    <div class="win-time" id="win-time"></div>
    <div class="win-record" id="win-record"></div>
    <div class="win-btns">
        <button class="btn btn-primary" id="win-again-btn" onclick="startGame()">🔄 Jeszcze raz</button>
        <button class="btn btn-secondary" id="win-menu-btn" onclick="showSetup()">🏠 Menu</button>
    </div>
</div>

<script>
/* ═══════════════════════════════════════
   LANGUAGE
═══════════════════════════════════════ */
let lang = localStorage.getItem('lang') || 'pl';

const T = {
    pl: {
        backLabel: 'Menu',
        imgType: 'Rodzaj obrazków',
        typePisanie: 'Pisanie',
        typeKraje: 'Kraje',
        boardSize: 'Rozmiar planszy',
        start: '▶ Graj',
        noRecord: '—',
        pairs: 'par',
        winTitle: 'Brawo!',
        winAgain: '🔄 Jeszcze raz',
        winMenu: '🏠 Menu',
        newRecord: '🏆 Nowy rekord!',
        prevRecord: 'Poprzedni rekord:',
    },
    en: {
        backLabel: 'Menu',
        imgType: 'Image type',
        typePisanie: 'Spelling',
        typeKraje: 'Countries',
        boardSize: 'Board size',
        start: '▶ Play',
        noRecord: '—',
        pairs: 'pairs',
        winTitle: 'Well done!',
        winAgain: '🔄 Play again',
        winMenu: '🏠 Menu',
        newRecord: '🏆 New record!',
        prevRecord: 'Previous record:',
    }
};

function setLang(l) {
    lang = l;
    localStorage.setItem('lang', l);
    applyLang();
}

function applyLang() {
    const t = T[lang];
    const activeStyle  = { background: 'rgba(255,255,255,0.45)', border: '2px solid rgba(255,255,255,0.9)' };
    const inactiveStyle = { background: 'rgba(255,255,255,0.1)',  border: '2px solid rgba(255,255,255,0.3)' };
    const plBtn = document.getElementById('lang-pl');
    const enBtn = document.getElementById('lang-en');
    Object.assign((lang === 'pl' ? plBtn : enBtn).style, activeStyle);
    Object.assign((lang === 'pl' ? enBtn : plBtn).style, inactiveStyle);

    document.getElementById('back-label').textContent         = t.backLabel;
    document.getElementById('lbl-imgtype').textContent        = t.imgType;
    document.getElementById('lbl-type-pisanie').textContent   = t.typePisanie;
    document.getElementById('lbl-type-kraje').textContent     = t.typeKraje;
    document.getElementById('lbl-boardsize').textContent      = t.boardSize;
    document.getElementById('lbl-start').textContent          = t.start;
    document.getElementById('win-title').textContent          = t.winTitle;
    document.getElementById('win-again-btn').textContent      = t.winAgain;
    document.getElementById('win-menu-btn').textContent       = t.winMenu;

    renderSizeGrid();
}

/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */

// 40 emoji images (from pisanie-style icon set)
const EMOJI_POOL = [
    '🐱','🐶','🦁','🐸','🐧','🦊','🐻','🦋',
    '🐴','🦔','🐍','🦌','🦞','🐞','🦄','🐬',
    '🦉','🦜','🏠','🚌','🎮','🍎','🍕','🌸',
    '⭐','🌈','🚀','🎯','🎨','🎸','🏆','💎',
    '🌴','🌊','🍭','🎃','🧊','🧀','🐘','🌟'
];

// 40 country flag codes (flagcdn.com)
const FLAG_POOL = [
    'pl','de','fr','es','it','gb','us','jp','cn','br',
    'au','ca','ru','in','mx','za','ar','kr','tr','nl',
    'se','no','fi','dk','pt','be','ch','at','gr','cz',
    'hu','ro','ua','eg','ng','ke','sa','ae','th','id'
];

// Board sizes: cols × rows → pairs count (cells / 2, floor for odd grids)
const BOARD_SIZES = [
    { key: '4x4',  cols: 4,  rows: 4,  pairs: 8  },
    { key: '5x5',  cols: 5,  rows: 5,  pairs: 12 },
    { key: '6x5',  cols: 6,  rows: 5,  pairs: 15 },
    { key: '7x4',  cols: 7,  rows: 4,  pairs: 14 },
    { key: '10x8', cols: 10, rows: 8,  pairs: 40 },
];

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let selectedType    = 'pisanie';
let selectedSizeKey = '4x4';
let timerInterval   = null;
let startTime       = null;
let elapsedSeconds  = 0;
let flippedCards    = [];
let matchedPairs    = 0;
let totalPairs      = 0;
let isLocked        = false;

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function getSize()             { return BOARD_SIZES.find(s => s.key === selectedSizeKey); }
function getRecord(key)        { const v = localStorage.getItem('memo-rec-' + key); return v !== null ? parseInt(v) : null; }
function saveRecord(key, secs) { localStorage.setItem('memo-rec-' + key, secs); }
function fmtTime(sec)          { return String(Math.floor(sec/60)).padStart(2,'0') + ':' + String(sec%60).padStart(2,'0'); }

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════════════════
   SETUP UI
═══════════════════════════════════════ */
function renderSizeGrid() {
    const grid = document.getElementById('size-grid');
    grid.innerHTML = '';
    BOARD_SIZES.forEach(size => {
        const rec = getRecord(size.key);
        const btn = document.createElement('button');
        btn.className = 'size-btn' + (size.key === selectedSizeKey ? ' selected' : '');
        btn.innerHTML =
            `<div class="size-label">${size.key.replace('x','×')}</div>` +
            `<div class="size-record">${rec !== null ? fmtTime(rec) : T[lang].noRecord}</div>`;
        btn.onclick = () => selectSize(size.key);
        grid.appendChild(btn);
    });
}

function selectType(type) {
    selectedType = type;
    document.getElementById('type-pisanie').classList.toggle('selected', type === 'pisanie');
    document.getElementById('type-kraje').classList.toggle('selected', type === 'kraje');
}

function selectSize(key) {
    selectedSizeKey = key;
    renderSizeGrid();
}

function showSetup() {
    clearInterval(timerInterval);
    renderSizeGrid();
    showScreen('screen-setup');
}

/* ═══════════════════════════════════════
   GAME
═══════════════════════════════════════ */
function startGame() {
    clearInterval(timerInterval);
    timerInterval = null;

    const size  = getSize();
    totalPairs  = size.pairs;
    matchedPairs = 0;
    flippedCards = [];
    isLocked     = false;
    elapsedSeconds = 0;

    // Pick images
    const pool    = selectedType === 'pisanie' ? EMOJI_POOL : FLAG_POOL;
    const images  = shuffle(pool).slice(0, totalPairs);

    // Duplicate for pairs, shuffle
    let cards = shuffle([...images, ...images]);

    // Pad to fill grid (5×5 needs 1 empty cell)
    const totalCells = size.cols * size.rows;
    while (cards.length < totalCells) cards.push(null);

    // Determine card pixel size
    const gapPx      = 7;
    const paddingPx  = 16;
    const maxW       = Math.min(window.innerWidth - 24, 960);
    const availW     = maxW - paddingPx * 2 - gapPx * (size.cols - 1);
    const rawSize    = Math.floor(availW / size.cols);
    const cardSize   = Math.max(38, Math.min(rawSize, 100));
    const emojiFontSz = Math.max(14, Math.floor(cardSize * 0.52));
    const frontSymSz  = Math.max(12, Math.floor(cardSize * 0.32));

    // Build board DOM
    const board = document.getElementById('board');
    board.style.gridTemplateColumns = `repeat(${size.cols}, ${cardSize}px)`;
    board.style.gap = gapPx + 'px';
    board.innerHTML = '';

    cards.forEach(imgVal => {
        const card = document.createElement('div');
        card.className = 'card' + (imgVal === null ? ' empty' : '');
        card.style.width  = cardSize + 'px';
        card.style.height = cardSize + 'px';

        if (imgVal !== null) {
            card.dataset.value = imgVal;
            card.addEventListener('click', () => flipCard(card));
        }

        const inner = document.createElement('div');
        inner.className = 'card-inner';

        // Front face (hidden side)
        const front = document.createElement('div');
        front.className = 'card-face card-front';
        const sym = document.createElement('span');
        sym.className = 'card-front-symbol';
        sym.style.fontSize = frontSymSz + 'px';
        sym.textContent = '?';
        front.appendChild(sym);

        // Back face (revealed side)
        const back = document.createElement('div');
        back.className = 'card-face card-back';

        if (selectedType === 'pisanie') {
            const span = document.createElement('span');
            span.className = 'emoji-content';
            span.style.fontSize = emojiFontSz + 'px';
            span.textContent = imgVal;
            back.appendChild(span);
        } else {
            const img = document.createElement('img');
            img.src = `https://flagcdn.com/40x30/${imgVal}.png`;
            img.alt = imgVal;
            img.style.maxWidth  = Math.floor(cardSize * 0.76) + 'px';
            img.style.maxHeight = Math.floor(cardSize * 0.76) + 'px';
            back.appendChild(img);
        }

        inner.appendChild(front);
        inner.appendChild(back);
        card.appendChild(inner);
        board.appendChild(card);
    });

    updatePairsCounter();

    // Timer
    document.getElementById('timer-display').textContent = '00:00';
    startTime = Date.now();
    timerInterval = setInterval(() => {
        elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer-display').textContent = fmtTime(elapsedSeconds);
    }, 1000);

    showScreen('screen-game');
}

function updatePairsCounter() {
    const el = document.getElementById('pairs-counter');
    if (el) el.textContent = `${matchedPairs}/${totalPairs} ${T[lang].pairs}`;
}

function flipCard(card) {
    if (isLocked) return;
    if (card.classList.contains('flipped'))  return;
    if (card.classList.contains('matched'))  return;

    card.classList.add('flipped');
    flippedCards.push(card);

    if (flippedCards.length === 2) {
        isLocked = true;
        checkMatch();
    }
}

function checkMatch() {
    const [a, b] = flippedCards;
    if (a.dataset.value === b.dataset.value) {
        setTimeout(() => {
            a.classList.add('matched', 'no-click');
            b.classList.add('matched', 'no-click');
            flippedCards = [];
            isLocked = false;
            matchedPairs++;
            updatePairsCounter();
            if (matchedPairs === totalPairs) endGame();
        }, 500);
    } else {
        setTimeout(() => {
            a.classList.remove('flipped');
            b.classList.remove('flipped');
            flippedCards = [];
            isLocked = false;
        }, 900);
    }
}

function endGame() {
    clearInterval(timerInterval);
    timerInterval = null;

    const finalSec  = Math.floor((Date.now() - startTime) / 1000);
    const prevRec   = getRecord(selectedSizeKey);
    const isNew     = prevRec === null || finalSec < prevRec;
    if (isNew) saveRecord(selectedSizeKey, finalSec);

    const t = T[lang];
    document.getElementById('win-time').textContent = fmtTime(finalSec);

    const recEl = document.getElementById('win-record');
    if (isNew) {
        recEl.textContent  = t.newRecord;
        recEl.className    = 'win-record new-record';
    } else {
        recEl.textContent  = `${t.prevRecord} ${fmtTime(prevRec)}`;
        recEl.className    = 'win-record';
    }

    showScreen('screen-win');
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
applyLang();
</script>
</body>
</html>
